<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E46 Minimalist HUD</title>
    <script src="cordova.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        :root {
            --bg-color: #050506;
            --panel-bg: rgba(10, 10, 12, 0.9);
            --border-color: rgba(255, 255, 255, 0.02);
            --accent-bmw: #ff7b00;
            --text-main: #f3f4f6;
            --text-muted: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text-main);
        }

        .hud-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            width: 100%; height: 100%;
            padding: 24px; gap: 24px;
        }

        .sidebar {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand-header {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-title {
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .brand-sub {
            font-size: 0.65rem;
            color: var(--accent-bmw);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 40px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-radius: 6px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.015);
        }

        .nav-item.active {
            border-left: 2px solid var(--accent-bmw);
            padding-left: 14px;
            background: rgba(255, 255, 255, 0.01);
        }

        .display-area {
            display: grid;
            grid-template-rows: 1fr 200px;
            gap: 24px;
            height: 100%;
        }

        .canvas-card {
            background: #050506;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        #canvas-container {
            width: 100%; height: 100%;
        }

        .audio-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .audio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .track-info {
            display: flex;
            flex-direction: column;
        }

        .track-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .track-artist {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            gap: 32px;
            margin: 10px auto;
        }

        .control-btn {
            background: none; border: none;
            color: var(--text-main);
            cursor: pointer; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.1em;
        }

        .play-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }

        .import-btn-label {
            font-size: 0.65rem;
            color: var(--accent-bmw);
            border: 1px solid rgba(255, 123, 0, 0.4);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 600;
            transition: all 0.2s;
        }

        .import-btn-label:hover {
            border-color: var(--accent-bmw);
            background: rgba(255, 123, 0, 0.05);
        }

        #audio-upload { display: none; }

        .progress-bar-container {
            width: 100%; height: 2px;
            background: rgba(255,255,255,0.03);
            position: relative; border-radius: 2px;
            cursor: pointer;
        }

        .progress-bar-fill {
            height: 100%; width: 0%;
            background: var(--accent-bmw);
            position: absolute; top: 0; left: 0;
        }

        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.65rem; letter-spacing: 0.2em;
            color: var(--text-muted);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="sidebar">
            <div class="brand-header">
                <div class="brand-title">M Performance</div>
                <div class="brand-sub">HUD Core</div>
            </div>

            <div class="nav-menu">
                <div class="nav-item active" onclick="launchNativeApp('com.google.android.apps.maps')">Navigation</div>
                <div class="nav-item" onclick="launchNativeApp('com.spotify.music')">Spotify</div>
                <div class="nav-item" onclick="launchNativeApp('com.android.chrome')">Browser</div>
                <div class="nav-item" onclick="launchNativeApp('com.android.settings')">Settings</div>
            </div>

            <div class="brand-header">
                <div id="hud-clock" style="font-size: 1.4rem; font-weight: 200; font-variant-numeric: tabular-nums;">00:00</div>
            </div>
        </div>

        <div class="display-area">
            <div class="canvas-card">
                <div id="loader">Syncing 3D System...</div>
                <div id="canvas-container"></div>
            </div>

            <div class="audio-card">
                <div class="audio-header">
                    <div class="track-info">
                        <span class="track-title" id="display-title">System Audio Idle</span>
                        <span class="track-artist" id="display-file">Select source track</span>
                    </div>
                    <label class="import-btn-label" for="audio-upload">Import Track</label>
                    <input type="file" id="audio-upload" accept="audio/*" onchange="handleAudioImport(this)">
                </div>

                <div class="audio-controls">
                    <button class="control-btn" onclick="skipAudio(-5)">-5s</button>
                    <button class="control-btn play-btn" id="play-state-toggle" onclick="toggleAudioState()">Play</button>
                    <button class="control-btn" onclick="skipAudio(5)">+5s</button>
                </div>

                <div class="progress-bar-container" onclick="seekAudio(event)">
                    <div class="progress-bar-fill" id="track-progress"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function initClockLoop() {
            const update = () => {
                const now = new Date();
                document.getElementById('hud-clock').textContent = 
                    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            };
            setInterval(update, 1000); update();
        }
        initClockLoop();

        function launchNativeApp(packageName) {
            if (window.plugins && window.plugins.launcher) {
                window.plugins.launcher.launch({ packageName: packageName }, null, null);
            } else {
                console.log(`Intent Trigger: ${packageName}`);
            }
        }

        let audioCtx = new Audio();
        audioCtx.addEventListener('timeupdate', () => {
            if(audioCtx.duration) {
                const pct = (audioCtx.currentTime / audioCtx.duration) * 100;
                document.getElementById('track-progress').style.width = `${pct}%`;
            }
        });
        audioCtx.addEventListener('ended', () => { document.getElementById('play-state-toggle').textContent = "Play"; });

        function handleAudioImport(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('display-title').textContent = file.name.replace(/\.[^/.]+$/, "");
                document.getElementById('display-file').textContent = "Local Disk Active";
                audioCtx.src = URL.createObjectURL(file);
                audioCtx.play();
                document.getElementById('play-state-toggle').textContent = "Pause";
            }
        }

        function toggleAudioState() {
            if(!audioCtx.src) return;
            if(audioCtx.paused) { audioCtx.play(); document.getElementById('play-state-toggle').textContent = "Pause"; }
            else { audioCtx.pause(); document.getElementById('play-state-toggle').textContent = "Play"; }
        }

        function skipAudio(seconds) {
            if(!audioCtx.src) return;
            audioCtx.currentTime = Math.max(0, Math.min(audioCtx.duration, audioCtx.currentTime + seconds));
        }

        function seekAudio(e) {
            if(!audioCtx.src || !audioCtx.duration) return;
            audioCtx.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audioCtx.duration;
        }

        let scene, camera, renderer, chassisNode;
        const viewPort = document.getElementById('canvas-container');

        function init3DEnvironment() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(38, viewPort.clientWidth / viewPort.clientHeight, 0.1, 100);
            camera.position.set(4.2, 1.4, 4.2);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(viewPort.clientWidth, viewPort.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            viewPort.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.6); 
            scene.add(ambient);

            const topSoftPanel = new THREE.DirectionalLight(0xffffff, 1.2);
            topSoftPanel.position.set(0, 8, 2);
            scene.add(topSoftPanel);

            const rearRimLight = new THREE.DirectionalLight(0xffffff, 1.5);
            rearRimLight.position.set(-6, 2, -4);
            scene.add(rearRimLight);

            document.addEventListener('deviceready', loadLocalAssetFile, false);
            if(!window.cordova) { loadLocalAssetFile(); }
        }

        function loadLocalAssetFile() {
            const xhr = new XMLHttpRequest();
            xhr.open("GET", "e46.glb", true);
            xhr.responseType = "arraybuffer";
            xhr.onload = function() {
                if (this.status === 200 || this.status === 0) {
                    const loader = new THREE.GLTFLoader();
                    loader.parse(this.response, "", function(gltf) {
                        chassisNode = gltf.scene;
                        
                        chassisNode.traverse((node) => {
                            if (node.isMesh) {
                                node.material.depthWrite = true;
                                node.material.transparent = false;
                                
                                if (node.material) {
                                    node.material.roughness = 1.0;
                                    node.material.metalness = 0.0;
                                    if (node.material.clearcoat !== undefined) {
                                        node.material.clearcoat = 0.0;
                                    }
                                }
                            }
                        });

                        const box = new THREE.Box3().setFromObject(chassisNode);
                        const center = box.getCenter(new THREE.Vector3());
                        chassisNode.position.x += (chassisNode.position.x - center.x);
                        chassisNode.position.z += (chassisNode.position.z - center.z);
                        chassisNode.position.y += (chassisNode.position.y - box.min.y) - 0.60;

                        scene.add(chassisNode);
                        document.getElementById('loader').style.opacity = '0';
                        camera.lookAt(new THREE.Vector3(0, 0.1, 0));
                    });
                }
            };
            xhr.send();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(chassisNode) chassisNode.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = viewPort.clientWidth / viewPort.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(viewPort.clientWidth, viewPort.clientHeight);
        });

        init3DEnvironment();
        animate();
    </script>
</body>
</html>
