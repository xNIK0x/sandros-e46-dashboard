<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMW iDrive 7.0 High-Fidelity M Launcher</title>
    <!-- Three.js Core and GLTFLoader Extensions -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- FontAwesome for Factory Icon Clones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --idrive-bg: #090b0e;
            --idrive-panel-gradient: linear-gradient(135deg, #161a22 0%, #0d1015 100%);
            --idrive-tile-border: rgba(255, 255, 255, 0.04);
            --bmw-m-blue: #0066cc;
            --bmw-m-red: #ff2a2a;
            --idrive-amber: #ff9f0a;
            --text-active: #ffffff;
            --text-standard: #cbd5e1;
            --text-muted: #4a5568;
            --sidebar-w: 65px;
            --topbar-h: 40px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }

        body {
            background-color: var(--idrive-bg);
            color: var(--text-standard);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        /* --- BMW TOP STATUS BAR --- */
        .idrive-top-bar {
            height: var(--topbar-h);
            width: 100%;
            background: rgba(4, 5, 7, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            z-index: 100;
        }
        .idrive-top-bar .system-mode {
            color: var(--bmw-m-red);
            font-weight: 800;
            font-style: italic;
            margin-right: 12px;
            border: 1px solid var(--bmw-m-red);
            padding: 1px 5px;
            font-size: 11px;
            border-radius: 3px;
        }
        .idrive-top-bar .time-display {
            color: var(--text-active);
            font-weight: 400;
        }
        .idrive-top-bar .telematics i {
            margin-left: 14px;
            color: var(--text-standard);
            font-size: 12px;
        }

        /* --- MAIN VIEWPORT WRAPPER --- */
        .idrive-viewport {
            display: flex;
            flex: 1;
            width: 100%;
            height: calc(100vh - var(--topbar-h));
            position: relative;
        }

        /* --- FACTORY LEFT ICON SIDEBAR DOCK --- */
        .idrive-sidebar {
            width: var(--sidebar-w);
            height: 100%;
            background: #06080b;
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            gap: 22px;
            z-index: 90;
        }
        .sidebar-icon-holder {
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: color 0.2s ease, background-color 0.2s ease;
        }
        .sidebar-icon-holder:hover, .sidebar-icon-holder.active {
            color: var(--text-active);
        }
        .sidebar-icon-holder.active::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 15%;
            height: 70%;
            width: 3px;
            background-color: var(--bmw-m-blue);
            box-shadow: 0 0 8px var(--bmw-m-blue);
        }

        /* --- INTERFACE SPLIT CONTROLLERS --- */
        .idrive-split-layout {
            display: flex;
            flex: 1;
            height: 100%;
            position: relative;
        }

        /* Left Container: Configuration Screen */
        .idrive-menu-panel {
            width: 46%;
            height: 100%;
            padding: 25px 15px 25px 35px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 14px;
            z-index: 20;
        }
        
        .idrive-title-group {
            margin-bottom: 8px;
        }
        .idrive-context-tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--bmw-m-blue);
            font-weight: 700;
            margin-bottom: 2px;
        }
        .idrive-main-title {
            font-size: 26px;
            font-weight: 300;
            color: var(--text-active);
            letter-spacing: -0.5px;
        }

        /* True BMW iDrive 7 Tile Blocks */
        .idrive-action-tile {
            background: var(--idrive-panel-gradient);
            border: 1px solid var(--idrive-tile-border);
            border-radius: 4px;
            padding: 18px 24px;
            text-decoration: none;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }
        /* Custom side accent line inside each tile block */
        .idrive-action-tile::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 3px;
            background: rgba(255, 255, 255, 0.15);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tile-headline {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-active);
            letter-spacing: 0.2px;
        }
        .tile-subtext {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* --- CLONE INTERACTION STATES (AMBER HIGHLIGHT) --- */
        .idrive-action-tile:hover {
            border-color: rgba(255, 159, 10, 0.35);
            background: linear-gradient(135deg, #1c222d 0%, #10141b 100%);
            transform: translateX(2px);
        }
        .idrive-action-tile:hover::before {
            background: var(--idrive-amber);
            box-shadow: 0 0 10px var(--idrive-amber);
            height: 100%;
            top: 0;
        }
        .idrive-action-tile:hover .tile-subtext {
            color: var(--text-standard);
        }

        /* Right Container: Real-Time 3D Rendering Area */
        .idrive-render-panel {
            width: 54%;
            height: 100%;
            position: relative;
        }
        #idrive-three-canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- CLONED TOP CONSOLE DISPLAY BAND -->
    <div class="idrive-top-bar">
        <div class="header-left">
            <span class="system-mode">M1</span>
            <span class="time-display" id="live-clock">12:00</span>
        </div>
        <div class="telematics">
            <i class="fa-solid fa-user"></i>&nbsp; Sandro
            <i class="fa-solid fa-bluetooth"></i>
            <i class="fa-solid fa-square-rss"></i>
            <i class="fa-solid fa-signal"></i>
        </div>
    </div>

    <!-- MAIN DISPLAY BASE VIEWPORT -->
    <div class="idrive-viewport">
        
        <!-- SIDE CONSOLE DOCK SHORTCUT BUTTONS -->
        <div class="idrive-sidebar">
            <div class="sidebar-icon-holder active"><i class="fa-solid fa-house"></i></div>
            <div class="sidebar-icon-holder"><i class="fa-solid fa-map-location-dot"></i></div>
            <div class="sidebar-icon-holder"><i class="fa-solid fa-compact-disc"></i></div>
            <div class="sidebar-icon-holder"><i class="fa-solid fa-phone-flip"></i></div>
            <div class="sidebar-icon-holder"><i class="fa-solid fa-gauge-high"></i></div>
        </div>

        <!-- MAIN INTERACTIVE HUB CORES -->
        <div class="idrive-split-layout">
            
            <!-- SELECTION INTERFACE AREA -->
            <div class="idrive-menu-panel">
                <div class="idrive-title-group">
                    <div class="idrive-context-tag">Configure Individual</div>
                    <div class="idrive-main-title">M Setup Layout</div>
                </div>
                
                <!-- Intent System triggers running local Android Applications -->
                <a href="intent://#Intent;package=com.google.android.apps.maps;scheme=https;end" class="idrive-action-tile" onmouseenter="runBmwCamera('navigation')" ontouchstart="runBmwCamera('navigation')">
                    <div class="tile-headline">🗺️ Navigation Map</div>
                    <div class="tile-subtext">Open factory Google Maps GPS tracking guide</div>
                </a>
                
                <a href="intent://#Intent;package=com.google.android.youtube;scheme=https;end" class="idrive-action-tile" onmouseenter="runBmwCamera('entertainment')" ontouchstart="runBmwCamera('entertainment')">
                    <div class="tile-headline">📺 Entertainment Center</div>
                    <div class="tile-subtext">Launch video media applications stream</div>
                </a>
                
                <a href="intent://#Intent;package=com.spotify.music;scheme=https;end" class="idrive-action-tile" onmouseenter="runBmwCamera('media')" ontouchstart="runBmwCamera('media')">
                    <div class="tile-headline">🎵 Audio Media Player</div>
                    <div class="tile-subtext">Control audio sound track output matrix</div>
                </a>
            </div>

            <!-- VEHICLE GRAPHICS RENDER GRID -->
            <div class="idrive-render-panel">
                <div id="idrive-three-canvas"></div>
            </div>
        </div>
    </div>

    <script>
        // --- REAL-TIME TOP PANEL CLOCK TRIGGER ---
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0'+minutes : minutes;
            document.getElementById('live-clock').innerText = hours + ':' + minutes + ' ' + ampm;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- PRODUCTION CORE THREE.JS VISUAL ENGINE ---
        const container = document.getElementById('idrive-three-canvas');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(42, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 5.5); // Factory iDrive lens framing depth

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // Factory Studio Multi-Angle Light Rig
        const highTechTopLight = new THREE.DirectionalLight(0xffffff, 3.2);
        highTechTopLight.position.set(4, 10, 6);
        scene.add(highTechTopLight);

        const groundReflectionFill = new THREE.DirectionalLight(0xffffff, 1.4);
        groundReflectionFill.position.set(-4, 4, -4);
        scene.add(groundReflectionFill);

        scene.add(new THREE.AmbientLight(0xffffff, 1.6));

        // Group wrapper hosting your 3D car model file
        const vehicleGroup = new THREE.Group();
        scene.add(vehicleGroup);

        // Native GLTF importer logic
        const loader = new THREE.GLTFLoader();
        loader.load('e46.gltf', function (gltf) {
            const model = gltf.scene;
            const boundBox = new THREE.Box3().setFromObject(model);
            const geometricCenter = boundBox.getCenter(new THREE.Vector3());
            
            model.position.x += (model.position.x - geometricCenter.x);
            model.position.y += (model.position.y - geometricCenter.y);
            model.position.z += (model.position.z - geometricCenter.z);
            
            vehicleGroup.add(model);
        });

        // Exact iDrive 7.0 Default Home Resting Positions
        let targetY = -0.75; 
        let targetX = 0.12;

        // Unified Hover/Touch Event Handler controlling Camera Mechanics
        function runBmwCamera(viewKey) {
            if (viewKey === 'navigation') {
                targetY = 0.65;   // Front headlamp view clip
                targetX = 0.22;
            } else if (viewKey === 'entertainment') {
                targetY = -2.4;   // Rear track profile stance view
                targetX = 0.10;
            } else if (viewKey === 'media') {
                targetY = -0.75;  // Default rest profile perspective
                targetX = 0.12;
            }
        }

        // Kinetic LERP Animation Loop Loop
        function runEngineLoop() {
            requestAnimationFrame(runEngineLoop);
            
            // 0.06 LERP factor mirrors the fluid, heavy pneumatic deceleration feel of the OEM BMW UI
            vehicleGroup.rotation.y += (targetY - vehicleGroup.rotation.y) * 0.06;
            vehicleGroup.rotation.x += (targetX - vehicleGroup.rotation.x) * 0.06;
            
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        runEngineLoop();
    </script>
</body>
</html>
