<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>E46 iDrive 7.0 Professional OS</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #e2e8f0;
        }

        /* iDrive 7.0 Full Screen Layout Base */
        .idrive-screen {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
            background: radial-gradient(circle at 30% 50%, #0d1527 0%, #05070a 70%);
        }

        /* 3D Viewport Zone */
        #canvas-container {
            flex: 1;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 30%;
            transform: translate(-50%, -50%);
            color: #3b82f6;
            font-size: 1rem;
            font-weight: bold;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: opacity 0.4s ease;
        }

        /* Navigation & App Menu Tiles Sidebar */
        .idrive-sidebar {
            width: 460px;
            height: 100%;
            background: linear-gradient(90deg, rgba(5,7,10,0) 0%, rgba(5,7,10,0.85) 20%, rgba(8,11,18,0.98) 100%);
            position: absolute;
            right: 0;
            top: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            padding: 30px 24px;
            justify-content: center;
            gap: 14px;
            box-shadow: -25px 0 50px rgba(0,0,0,0.6);
        }

        /* iDrive Flat Geometric Tile Design */
        .idrive-tile {
            background: linear-gradient(135deg, rgba(16,24,40,0.85) 0%, rgba(10,14,23,0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        /* Mystic Blue Selection Bar Accent */
        .idrive-tile::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background-color: transparent;
            transition: background-color 0.2s;
        }

        .idrive-tile.active, .idrive-tile:active {
            background: linear-gradient(135deg, rgba(28,43,73,0.9) 0%, rgba(14,22,38,0.98) 100%);
            border-color: rgba(59, 130, 246, 0.5);
            transform: translateX(-4px);
        }

        .idrive-tile.active::before, .idrive-tile:active::before {
            background-color: #3b82f6; /* Custom Mystic Blue Factory Match */
        }

        .tile-content {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .tile-icon {
            font-size: 1.6rem;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tile-text {
            display: flex;
            flex-direction: column;
        }

        .tile-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .tile-status {
            font-size: 0.8rem;
            color: #748094;
            margin-top: 2px;
        }

        /* Top Bar Status Layout */
        .top-status-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
            pointer-events: none;
        }

        .sys-clock {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .sys-badge {
            font-size: 0.8rem;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(90deg, #1d4ed8 0%, #ef4444 100%); /* M-Performance colors */
            padding: 4px 14px;
            border-radius: 3px;
            letter-spacing: 2px;
        }

        /* Custom Built-In Offline Audio Player UI Overlay */
        .music-player-panel {
            background: rgba(10, 15, 26, 0.96);
            border-top: 2px solid #3b82f6;
            position: absolute;
            bottom: -220px;
            left: 0;
            width: calc(100% - 460px);
            height: 180px;
            z-index: 4;
            transition: bottom 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .music-player-panel.visible {
            bottom: 0;
        }

        .track-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .track-meta h4 {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .track-meta p {
            font-size: 0.85rem;
            color: #64748b;
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 10px 0;
        }

        .btn-ctrl {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-ctrl:active {
            color: #3b82f6;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: #1e293b;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #3b82f6;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="idrive-screen">
        <!-- System Top Information Line -->
        <div class="top-status-bar">
            <div class="sys-clock" id="idrive-clock">00:00</div>
            <div class="sys-badge">E46 //M</div>
        </div>

        <!-- 3D Environment Node Viewport -->
        <div id="loader">Initializing E46 Interface...</div>
        <div id="canvas-container"></div>

        <!-- Integrated Offline Music Module -->
        <div class="music-player-panel" id="audio-panel">
            <div class="track-details">
                <div class="track-meta">
                    <h4 id="audio-title">No Local Media Detected</h4>
                    <p id="audio-artist">Drop MP3s into /sdcard/Music/E46Player/</p>
                </div>
                <div class="track-index" id="audio-count">0/0</div>
            </div>
            
            <div class="player-controls">
                <button class="btn-ctrl" onclick="prevTrack()">⏮</button>
                <button class="btn-ctrl" id="play-btn" onclick="togglePlay()">▶</button>
                <button class="btn-ctrl" onclick="nextTrack()">⏭</button>
            </div>

            <div class="progress-container" onclick="seekAudio(event)">
                <div class="progress-bar" id="audio-progress"></div>
            </div>
        </div>

        <!-- Main Operating System Navigation Bar -->
        <div class="idrive-sidebar">
            
            <div class="idrive-tile active" id="tile-home" onclick="switchView('home', 'side')">
                <div class="tile-content">
                    <div class="tile-icon" style="color:#3b82f6;">🚗</div>
                    <div class="tile-text">
                        <div class="tile-title">Chassis Overview</div>
                        <div class="tile-status">System Diagnostic OK</div>
                    </div>
                </div>
            </div>

            <div class="idrive-tile" id="tile-nav" onclick="switchView('nav', 'front'); launchAndroidApp('com.google.android.apps.maps')">
                <div class="tile-content">
                    <div class="tile-icon" style="color:#ef4444;">🧭</div>
                    <div class="tile-text">
                        <div class="tile-title">Navigation System</div>
                        <div class="tile-status">Launch Google Maps</div>
                    </div>
                </div>
                <div>➔</div>
            </div>

            <div class="idrive-tile" id="tile-media" onclick="switchView('media', 'rear')">
                <div class="tile-content">
                    <div class="tile-icon" style="color:#10b981;">🎵</div>
                    <div class="tile-text">
                        <div class="tile-title">Music</div>
                        <div class="tile-status" id="player-tile-status">Scanning Directory Storage...</div>
                    </div>
                </div>
                <div>➔</div>
            </div>

            <div class="idrive-tile" id="tile-video" onclick="switchView('video', 'front'); launchAndroidApp('com.google.android.youtube')">
                <div class="tile-content">
                    <div class="tile-icon" style="color:#ff0000;">📺</div>
                    <div class="tile-text">
                        <div class="tile-title">Entertainment Feed</div>
                        <div class="tile-status">Launch YouTube Network</div>
                    </div>
                </div>
                <div>➔</div>
            </div>

        </div>
    </div>

    <!-- Graphics Library Standard Components -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // --- SECTION 1: SYSTEM CLOCK ---
        function runClock() {
            const date = new Date();
            let h = date.getHours();
            let m = date.getMinutes();
            document.getElementById('idrive-clock').innerText = `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}`;
        }
        setInterval(runClock, 1000);
        runClock();

        // --- SECTION 2: 3D GRAPHICS ENGINE & CAMERA ROTATION MATRIX ---
        const container = document.getElementById('canvas-container');
        const loaderLabel = document.getElementById('loader');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05070a);
        scene.fog = new THREE.FogExp2(0x05070a, 0.07);

        const camera = new THREE.PerspectiveCamera(38, container.clientWidth / container.clientHeight, 0.1, 1000);
        
        // Default target coordinates looking at the car's side profile view
        let targetCameraPos = { x: -5.2, y: 1.4, z: 5.2 };
        camera.position.set(targetCameraPos.x, targetCameraPos.y, targetCameraPos.z);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // Professional Lighting Configurations (Studio Quality Panels)
        scene.add(new THREE.AmbientLight(0xffffff, 0.45));
        
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
        keyLight.position.set(6, 10, 5);
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0x3b82f6, 0.9); // Mystic Blue ambient floor reflective accent
        fillLight.position.set(-6, -2, -5);
        scene.add(fillLight);

        const floorGrid = new THREE.GridHelper(40, 40, 0x1e293b, 0x0b0f19);
        floorGrid.position.y = -0.68;
        scene.add(floorGrid);

        let e46Chassis = null;
        const gltfLoader = new THREE.GLTFLoader();

        function loadCarAsset() {
            gltfLoader.load('e46.gltf', 
                (gltf) => { setupCarModel(gltf); },
                undefined, 
                () => {
                    gltfLoader.load('e46.glb', (glb) => { setupCarModel(glb); }, undefined, () => {
                        loaderLabel.innerText = "Chassis Asset Missing (.gltf / .glb)";
                    });
                }
            );
        }

        function setupCarModel(gltf) {
            e46Chassis = gltf.scene;
            const boundingBox = new THREE.Box3().setFromObject(e46Chassis);
            const centerOffset = boundingBox.getCenter(new THREE.Vector3());
            
            e46Chassis.position.x += (e46Chassis.position.x - centerOffset.x);
            e46Chassis.position.z += (e46Chassis.position.z - centerOffset.z);
            e46Chassis.position.y += (e46Chassis.position.y - boundingBox.min.y) - 0.68; // Snap chassis directly to floor

            scene.add(e46Chassis);
            loaderLabel.style.opacity = '0';
            camera.lookAt(new THREE.Vector3(0, 0.1, 0));
        }
        loadCarAsset();

        // 3D View Vector Coordinate Mapping Rules (Smooth Interpolation)
        function switchView(tileId, angle) {
            // Manage Active Sidebar DOM Highlighting Style states
            document.querySelectorAll('.idrive-tile').forEach(t => t.classList.remove('active'));
            const targetTile = document.getElementById(`tile-${tileId}`);
            if(targetTile) targetTile.classList.add('active');

            // Handle Bottom Audio Panel Display states
            const audioPanel = document.getElementById('audio-panel');
            if (tileId === 'media') {
                audioPanel.classList.add('visible');
                initializeOfflineScanner(); 
            } else {
                audioPanel.classList.remove('visible');
            }

            // Assign Spatial Target Locations Based On Selected Layout Node
            if (angle === 'side') {
                targetCameraPos = { x: -5.4, y: 1.4, z: 5.2 }; // Perfect Side View
            } else if (angle === 'front') {
                targetCameraPos = { x: -0.1, y: 1.3, z: 6.2 }; // Sweeping Front Nose View
            } else if (angle === 'rear') {
                targetCameraPos = { x: 0.1, y: 1.6, z: -6.0 }; // Clean Tail Lens View
            }
        }

        // Frame Rendering Update Optimization Loop
        function renderTick() {
            requestAnimationFrame(renderTick);
            
            // Linear Interpolation (Lerp) calculations to smoothly glide camera into view positions
            camera.position.x += (targetCameraPos.x - camera.position.x) * 0.06;
            camera.position.y += (targetCameraPos.y - camera.position.y) * 0.06;
            camera.position.z += (targetCameraPos.z - camera.position.z) * 0.06;
            camera.lookAt(new THREE.Vector3(0, 0.1, 0));

            // Idle rotational animation if car is in side review mode
            if (e46Chassis && Math.abs(targetCameraPos.x - (-5.4)) < 0.2) {
                e46Chassis.rotation.y += 0.002;
            } else if(e46Chassis) {
                e46Chassis.rotation.y *= 0.9; // Return chassis back to zero center point smoothly
            }

            renderer.render(scene, camera);
        }
        requestAnimationFrame(renderTick);


        // --- SECTION 3: NATIVE ANDROID APPLICATION SYSTEM LAUNCH INTENTS ---
        function launchAndroidApp(packageName) {
            console.log("Routing Launch Token package target: " + packageName);
            if (typeof cordova !== 'undefined' && cordova.plugins && cordova.plugins.intentShim) {
                cordova.plugins.intentShim.startActivity({
                    action: "android.intent.action.MAIN",
                    package: packageName,
                    category: "android.intent.category.LAUNCHER"
                }, 
                () => console.log("Handoff Success"), 
                (err) => console.error("Intent target unavailable: " + err));
            }
        }


        // --- SECTION 4: CUSTOM OFF-LINE LOCAL COMPONENT MEDIA PLAYER ENGINE ---
        let internalAudioEngine = new Audio();
        let scannedTracklist = [];
        let runningTrackIndex = 0;
        let isScannerInitialized = false;

        function initializeOfflineScanner() {
            if (isScannerInitialized) return;
            
            // Checks if Cordova Storage Permissions are mapped natively inside the device context
            if (typeof cordova !== 'undefined' && typeof resolveLocalFileSystemURL !== 'undefined') {
                // Target Folder Path: Internal Storage -> /Music/E46Player/
                const targetDirUri = "file:///sdcard/Music/E46Player/";
                
                window.resolveLocalFileSystemURL(targetDirUri, function(dirEntry) {
                    const dirReader = dirEntry.createReader();
                    dirReader.readEntries(function(entries) {
                        scannedTracklist = entries.filter(e => e.isFile && e.name.toLowerCase().endsWith('.mp3'));
                        
                        if(scannedTracklist.length > 0) {
                            isScannerInitialized = true;
                            document.getElementById('player-tile-status').innerText = `${scannedTracklist.length} Local Tracks Found`;
                            loadTargetTrack(0);
                        } else {
                            document.getElementById('player-tile-status').innerText = "Folder Empty. Add MP3s.";
                        }
                    }, handleScanError);
                }, function(err) {
                    console.warn("Target folder access denied. Creating placeholder array for runtime dashboard safety simulation.");
                    loadMockPlaylist();
                });
            } else {
                loadMockPlaylist();
            }
        }

        function loadMockPlaylist() {
            isScannerInitialized = true;
            document.getElementById('player-tile-status').innerText = "Demo Playlist Loaded";
            scannedTracklist = [
                { name: "BMW Straight Six Engine Sound.mp3", nativeURL: "" },
                { name: "M3 CSL Intake Track.mp3", nativeURL: "" }
            ];
            loadTargetTrack(0);
        }

        function handleScanError(error) {
            console.error("Storage Access Exception Blocked: ", error);
            document.getElementById('player-tile-status').innerText = "Storage Scan Failure";
        }

        function loadTargetTrack(idx) {
            if (scannedTracklist.length === 0) return;
            runningTrackIndex = idx;
            
            const currentTrack = scannedTracklist[runningTrackIndex];
            document.getElementById('audio-title').innerText = currentTrack.name.replace('.mp3', '');
            document.getElementById('audio-artist').innerText = "Local Storage Media File";
            document.getElementById('audio-count').innerText = `${runningTrackIndex + 1}/${scannedTracklist.length}`;
            
            if(currentTrack.nativeURL) {
                internalAudioEngine.src = currentTrack.nativeURL;
            }
            internalAudioEngine.load();
        }

        function togglePlay() {
            if(internalAudioEngine.paused) {
                internalAudioEngine.play().catch(e => console.log("Audio pipeline initialized without dynamic asset source."));
                document.getElementById('play-btn').innerText = "⏸";
            } else {
                internalAudioEngine.pause();
                document.getElementById('play-btn').innerText = "▶";
            }
        }

        function nextTrack() {
            let nextIdx = (runningTrackIndex + 1) % scannedTracklist.length;
            loadTargetTrack(nextIdx);
            internalAudioEngine.play().catch(()=>{});
            document.getElementById('play-btn').innerText = "⏸";
        }

        function prevTrack() {
            let prevIdx = (runningTrackIndex - 1 + scannedTracklist.length) % scannedTracklist.length;
            loadTargetTrack(prevIdx);
            internalAudioEngine.play().catch(()=>{});
            document.getElementById('play-btn').innerText = "⏸";
        }

        internalAudioEngine.addEventListener('timeupdate', () => {
            if(!internalAudioEngine.duration) return;
            const percentage = (internalAudioEngine.currentTime / internalAudioEngine.duration) * 100;
            document.getElementById('audio-progress').style.width = `${percentage}%`;
        });

        internalAudioEngine.addEventListener('ended', () => { nextTrack(); });

        function seekAudio(event) {
            const containerWidth = event.currentTarget.clientWidth;
            const clickX = event.offsetX;
            if(internalAudioEngine.duration) {
                internalAudioEngine.currentTime = (clickX / containerWidth) * internalAudioEngine.duration;
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
