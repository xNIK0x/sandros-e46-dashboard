name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova

      - name: Initialize Cordova Project Workspace
        run: |
          cordova create build_workspace com.bmw.e46hud "E46 Minimalist HUD"
          cp config.xml build_workspace/config.xml
          cp index.html build_workspace/www/index.html
          if [ -f "e46.glb" ]; then cp e46.glb build_workspace/www/e46.glb; fi

      - name: Compile Android APK
        run: |
          cd build_workspace
          cordova platform add android --nosave
          cordova build android --device

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: E46-HUD-Release-APK
          path: build_workspace/platforms/android/app/build/outputs/apk/debug/app-debug.apk
